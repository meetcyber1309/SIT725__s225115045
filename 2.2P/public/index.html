<!DOCTYPE html>
<html>
<head>
    <title>Calculator App</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        .container { max-width: 300px; padding: 20px; border: 1px solid #ccc; }
        input { margin-bottom: 10px; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Remote Calculator</h2>
        <input type="number" id="num1" placeholder="First Number">
        <input type="number" id="num2" placeholder="Second Number">
        <button onclick="calculate()">Add on Server</button>
        <h3 id="result">Result: </h3>
    </div>

    <script>
        async function calculate() {
    // 1. Get values from the input boxes
    const val1 = document.getElementById('num1').value;
    const val2 = document.getElementById('num2').value;
    const resultElement = document.getElementById('result');

    try {
        // 2. Call the server (Note: number1 and number2 match the server file)
        const response = await fetch(`/addTwoNumbers?number1=${val1}&number2=${val2}`);
        const json = await response.json();

        // 3. Display the result
        if (json.status === 200) {
            resultElement.innerText = "Result: " + json.data;
        } else {
            resultElement.innerText = "Error: " + json.message;
        }
    } catch (error) {
        resultElement.innerText = "Error: Server not responding";
    }
}   

    </script>
</body>
</html>
